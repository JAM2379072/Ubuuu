name: Setup XFCE and VNC with Cloudflared (6-Hour Runtime)

on:
  workflow_dispatch:

jobs:
  setup-xfce-vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Limit the workflow to 6 hours

    steps:
      - name: Update and Upgrade System
        run: |
          sudo apt-get update && sudo apt-get upgrade -y

      - name: Install XFCE and Dependencies
        run: |
          # Install XFCE desktop environment and dependencies
          sudo apt-get install -y xfce4 xfce4-goodies tigervnc-standalone-server

      - name: Add and Install Cloudflared
        run: |
          # Add Cloudflare's GPG repository
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list

          # Update and install Cloudflared
          sudo apt-get update && sudo apt-get install -y cloudflared

      - name: Configure Cloudflared Tunnel
        env:
          TUNNEL_TOKEN: eyJhIjoiY2U5MWFiYmQyYWU3YjhlZjQxMmU0YWQxODJmYzUxYzciLCJ0IjoiM2MzZGE2MmEtMzMwOS00ZjAxLTkxYTctYTQ1NjBkNDVjZTQ0IiwicyI6Ik5UVTJOakZoTm1JdFl6RXlPQzAwWWpnekxUbGlZMll0Wm1OaE1EZGhNVEZtTXpWaiJ9
        run: |
          sudo cloudflared service install "$TUNNEL_TOKEN"

      - name: Configure VNC
        run: |
          # Create the user 'ash' and set the password to 'root'
          sudo useradd -m ash
          echo "ash:root" | sudo chpasswd

          # Configure VNC for user "ash" with XFCE
          sudo runuser -l ash -c "mkdir -p \$HOME/.vnc"
          echo 'xfce4-session' | sudo tee /home/ash/.vnc/xstartup
          sudo chmod +x /home/ash/.vnc/xstartup
          sudo runuser -l ash -c "echo 'root' | vncpasswd -f > /home/ash/.vnc/passwd && chmod 600 /home/ash/.vnc/passwd"

          # Start VNC server on display :1 (port 5901)
          sudo runuser -l ash -c "vncserver :1"

      - name: Final Sleep (Keep Runner Active for 6 Hours)
        run: |
          echo "XFCE environment is set up! Keeping alive for 6 hours..."
          sleep 6h
