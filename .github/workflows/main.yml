name: Setup GNOME with Cloudflared and VNC

on:
  workflow_dispatch:

jobs:
  setup-gnome-cloudflared-vnc:
    runs-on: ubuntu-latest

    steps:
      - name: Update Runner
        run: sudo apt update && sudo apt upgrade -y

      - name: Install Cloudflared
        run: |
          # Add Cloudflared repository and install
          curl -fsSl https://pkg.cloudflare.com/cloudflared-ascii.repo | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt update
          sudo apt install -y cloudflared

      - name: Configure Cloudflared Tunnel
        env:
          TUNNEL_TOKEN: eyJhIjoiY2U5MWFiYmQyYWU3YjhlZjQxMmU0YWQxODJmYzUxYzciLCJ0IjoiM2MzZGE2MmEtMzMwOS00ZjAxLTkxYTctYTQ1NjBkNDVjZTQ0IiwcyI6Ik5UVTJOakZoTm1JdFl6RXlPQzAwWWpnekxUbGlZMll0Wm1OaE1EZGhNVEZtTXpWaiJ9
        run: |
          # Install and set up Cloudflared service with a provided token
          sudo cloudflared service install "$TUNNEL_TOKEN"

      - name: Install GNOME
        run: |
          sudo apt install -y ubuntu-gnome-desktop gnome-shell gdm3
          sudo systemctl set-default graphical.target

      - name: Install and Configure VNC Server
        run: |
          # Install TigerVNC server
          sudo apt install -y tigervnc-standalone-server

          # Create a user for VNC and set the password
          sudo useradd -m gnomeuser
          echo "gnomeuser:password" | sudo chpasswd
          sudo runuser -l gnomeuser -c "mkdir -p \$HOME/.vnc && echo 'password' | vncpasswd -f > \$HOME/.vnc/passwd && chmod 600 \$HOME/.vnc/passwd"

      - name: Start VNC Server
        run: |
          # Start VNC server on display :1
          sudo runuser -l gnomeuser -c "vncserver :1"

      - name: Final Instructions
        run: |
          echo "Setup Complete!"
          echo "Connect to your GNOME desktop via the Cloudflare Zero Trust hostname using a VNC client on port 5901."
